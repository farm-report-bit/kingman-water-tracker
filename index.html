<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kingman Water Tracker</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0d;
  --surface:#161616;
  --surface2:#1e1e1e;
  --border:#2a2a2a;
  --border2:#333;
  --text:#f0f0f0;
  --text2:#888;
  --text3:#555;
  --green:#22c55e;
  --green-dim:#16a34a22;
  --red:#ef4444;
  --red-dim:#dc262622;
  --blue:#3b82f6;
  --accent:#f0f0f0;
}
body{background:var(--bg);color:var(--text);min-height:100vh;font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased}

/* scrollbar */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

.shell{max-width:480px;margin:0 auto;padding:36px 20px 80px}

/* header */
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:44px}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#22c55e,#16a34a);display:flex;align-items:center;justify-content:center}
.logo-mark svg{width:16px;height:16px;fill:none;stroke:#fff;stroke-width:2.5;stroke-linecap:round}
.logo-text{}
.logo-name{font-size:14px;font-weight:700;color:var(--text);letter-spacing:-.3px}
.logo-farm{font-size:11px;color:var(--text3);margin-top:1px;font-weight:500}
.qr-trigger{width:34px;height:34px;border-radius:8px;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;color:var(--text2)}
.qr-trigger:hover{background:var(--surface2);border-color:var(--border2);color:var(--text)}
.qr-trigger svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

/* pill */
.pill{display:inline-flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:6px 12px;font-size:12px;color:var(--text2);margin-bottom:28px}
.pill-dot{width:6px;height:6px;border-radius:50%;background:var(--green)}

/* home */
.home-eyebrow{font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-bottom:10px}
.home-title{font-size:26px;font-weight:700;color:var(--text);letter-spacing:-.6px;line-height:1.2;margin-bottom:32px}
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}

.mode-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:16px;
  padding:22px 18px 18px;
  cursor:pointer;
  transition:all .25s cubic-bezier(.4,0,.2,1);
  position:relative;
  overflow:hidden;
}
.mode-card::before{
  content:'';position:absolute;inset:0;opacity:0;transition:opacity .25s;border-radius:16px;
}
.mode-card.startup::before{background:var(--green-dim)}
.mode-card.shutdown::before{background:var(--red-dim)}
.mode-card:hover{border-color:var(--border2);transform:translateY(-2px)}
.mode-card.startup:hover{border-color:var(--green)33}
.mode-card.shutdown:hover{border-color:var(--red)33}
.mode-card:hover::before{opacity:1}
.mode-card:active{transform:translateY(0) scale(.98)}

.mc-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:14px}
.mc-icon.g{background:var(--green-dim)}
.mc-icon.r{background:var(--red-dim)}
.mc-icon svg{width:16px;height:16px;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.mc-icon.g svg{stroke:var(--green)}
.mc-icon.r svg{stroke:var(--red)}
.mc-label{font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px;letter-spacing:-.2px}
.mc-desc{font-size:11px;color:var(--text3);line-height:1.5}
.mc-arrow{position:absolute;bottom:16px;right:16px;color:var(--text3);font-size:14px;transition:transform .2s,color .2s}
.mode-card:hover .mc-arrow{transform:translateX(3px);color:var(--text2)}

/* card */
.card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:26px;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* section head */
.sec-head{display:flex;align-items:center;gap:10px;margin-bottom:26px;padding-bottom:18px;border-bottom:1px solid var(--border)}
.sec-badge{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:4px 10px 4px 8px;font-size:11px;font-weight:600;letter-spacing:.2px}
.sec-badge.g{background:var(--green-dim);color:var(--green)}
.sec-badge.r{background:var(--red-dim);color:var(--red)}
.sec-badge-dot{width:6px;height:6px;border-radius:50%;background:currentColor}
.sec-info{flex:1}
.sec-title{font-size:17px;font-weight:700;color:var(--text);letter-spacing:-.3px}
.sec-sub{font-size:12px;color:var(--text3);margin-top:2px}

/* fields */
.field{margin-bottom:18px}
.flabel{font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--text3);margin-bottom:7px;display:flex;justify-content:space-between;align-items:center}
.flabel-opt{font-size:10px;color:var(--text3);opacity:.6;letter-spacing:.3px;font-weight:500;text-transform:none}
.finput{
  width:100%;
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:10px;
  padding:11px 14px;
  font-size:14px;
  color:var(--text);
  outline:none;
  font-family:'Inter',sans-serif;
  transition:border-color .2s,background .2s;
  -webkit-appearance:none;
  color-scheme:dark;
}
.finput:focus{border-color:var(--border2);background:#222}
.finput::placeholder{color:var(--text3)}
select.finput option{background:#1e1e1e}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* blocks */
.block-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.bblock{
  border:1px solid var(--border);
  border-radius:7px;
  padding:6px 11px;
  font-size:12px;
  font-weight:600;
  cursor:pointer;
  background:var(--surface2);
  color:var(--text3);
  transition:all .15s;
  font-family:'Inter',sans-serif;
  letter-spacing:.2px;
}
.bblock:hover{border-color:var(--border2);color:var(--text2)}
.bblock.sel{background:var(--text);color:var(--bg);border-color:var(--text)}
.sel-blocks{font-size:11px;color:var(--green);margin-top:8px;font-weight:500}

/* fertigation */
.fert-row{
  display:flex;align-items:center;gap:12px;
  padding:13px 14px;
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:10px;
  cursor:pointer;
  transition:all .2s;
  user-select:none;
}
.fert-row:hover{border-color:var(--border2)}
.fert-row.on{border-color:var(--green)55;background:#16a34a11}
.fert-toggle{
  width:20px;height:20px;border-radius:5px;
  border:1.5px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;font-size:11px;
  transition:all .2s;
  color:transparent;
}
.fert-row.on .fert-toggle{background:var(--green);border-color:var(--green);color:#fff}
.fert-label{font-size:13px;font-weight:600;color:var(--text)}
.fert-desc{font-size:11px;color:var(--text3);margin-top:1px}

/* error */
.err{font-size:12px;color:var(--red);margin-top:12px;padding:10px 14px;background:#ef444411;border-radius:8px;border:1px solid #ef444422}

/* nav */
.nav{display:flex;justify-content:space-between;align-items:center;margin-top:24px;padding-top:18px;border-top:1px solid var(--border)}

.btn-back{
  display:inline-flex;align-items:center;gap:6px;
  background:transparent;border:1px solid var(--border);
  border-radius:9px;padding:9px 16px;
  font-size:13px;font-weight:600;color:var(--text2);
  cursor:pointer;font-family:'Inter',sans-serif;
  transition:all .2s;
}
.btn-back:hover{background:var(--surface2);border-color:var(--border2);color:var(--text)}

.btn-save{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--text);border:none;border-radius:9px;
  padding:10px 22px;font-size:13px;font-weight:700;
  color:var(--bg);cursor:pointer;font-family:'Inter',sans-serif;
  transition:all .2s;position:relative;overflow:hidden;
  letter-spacing:-.1px;
}
.btn-save::after{
  content:'';position:absolute;inset:0;background:#fff;opacity:0;transition:opacity .2s;
}
.btn-save:hover::after{opacity:.08}
.btn-save:active{transform:scale(.97)}
.btn-save:disabled{opacity:.4;cursor:not-allowed}
.btn-save.saved{background:var(--green);color:#fff}

/* success */
.success-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:24px}
.success-card{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:40px 32px;max-width:380px;width:100%;text-align:center;animation:fadeUp .4s ease}
.s-ring{width:64px;height:64px;border-radius:50%;border:2px solid var(--green);display:flex;align-items:center;justify-content:center;margin:0 auto 22px;position:relative}
.s-ring svg{width:24px;height:24px;stroke:var(--green);stroke-width:2.5;fill:none;stroke-linecap:round;stroke-linejoin:round}
.s-title{font-size:20px;font-weight:700;color:var(--text);letter-spacing:-.4px;margin-bottom:6px}
.s-sub{font-size:13px;color:var(--text3);margin-bottom:28px}
.s-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:24px}
.s-stat{background:var(--surface2);border-radius:12px;padding:14px;border:1px solid var(--border)}
.s-slabel{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin-bottom:5px}
.s-sval{font-size:19px;font-weight:700;color:var(--text);letter-spacing:-.3px}
.btn-again{
  width:100%;background:var(--surface2);border:1px solid var(--border2);
  border-radius:10px;padding:12px;font-size:13px;font-weight:700;
  color:var(--text);cursor:pointer;font-family:'Inter',sans-serif;
  transition:all .2s;letter-spacing:-.1px;
}
.btn-again:hover{background:var(--surface);border-color:var(--text3)}

/* qr */
.qr-shell{min-height:100vh;background:var(--bg);padding:36px 20px;display:none}
.qr-top{max-width:700px;margin:0 auto 28px;display:flex;align-items:center;gap:14px}
.qr-title{font-size:18px;font-weight:700;color:var(--text);letter-spacing:-.3px}
.qr-subtitle{font-size:12px;color:var(--text3);margin-top:3px}
.qr-grid{max-width:700px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:12px}
.qr-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;display:flex;flex-direction:column;align-items:center;text-align:center}
.qr-name{font-size:13px;font-weight:700;color:var(--text);margin-bottom:14px;letter-spacing:-.2px}
.qr-img{border-radius:8px;filter:invert(1)}
.qr-hint{font-size:10px;color:var(--text3);margin-top:8px;letter-spacing:.8px;text-transform:uppercase}
.qr-dl{background:transparent;border:1px solid var(--border);border-radius:7px;padding:6px 14px;font-size:11px;font-weight:600;color:var(--text2);cursor:pointer;margin-top:10px;font-family:'Inter',sans-serif;transition:all .2s;letter-spacing:.2px}
.qr-dl:hover{border-color:var(--border2);color:var(--text)}
.print-hint{text-align:center;font-size:10px;color:var(--text3);margin-top:28px;letter-spacing:1px;text-transform:uppercase}

.hidden{display:none}
</style>
</head>
<body>

<!-- QR -->
<div class="qr-shell" id="qr-view">
  <div class="qr-top">
    <button class="btn-back" onclick="showView('home')">← Back</button>
    <div><div class="qr-title">Well QR codes</div><div class="qr-subtitle">Scan to open with well pre-selected</div></div>
  </div>
  <div class="qr-grid" id="qr-grid"></div>
  <div class="print-hint">Print with Cmd+P / Ctrl+P</div>
</div>

<!-- Success -->
<div class="success-wrap hidden" id="success-view">
  <div class="success-card">
    <div class="s-ring">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <div class="s-title" id="s-title">Logged</div>
    <div class="s-sub" id="s-sub"></div>
    <div class="s-stats" id="s-stats"></div>
    <button class="btn-again" onclick="resetToHome()">Log another run</button>
  </div>
</div>

<!-- Main -->
<div class="shell" id="form-view">
  <div class="header">
    <div class="logo">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24"><path d="M12 2C6 8 4 12 4 15a8 8 0 0016 0c0-3-2-7-8-13z"/></svg>
      </div>
      <div class="logo-text">
        <div class="logo-name">Water Tracker</div>
        <div class="logo-farm">Kingman Farm</div>
      </div>
    </div>
    <div class="qr-trigger" onclick="showView('qr')" title="QR Codes">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="3" height="3" rx=".5"/><rect x="18" y="14" width="3" height="3" rx=".5"/><rect x="14" y="18" width="3" height="3" rx=".5"/><rect x="18" y="18" width="3" height="3" rx=".5"/></svg>
    </div>
  </div>
  <div id="scanned-pill" class="pill hidden">
    <span class="pill-dot"></span><span id="pill-text"></span>
  </div>
  <div id="main-content"></div>
</div>

<script>
const SHEET_URL="https://script.google.com/macros/s/AKfycbz1h8OLEPKHgn4ooY3cbYijt9rW9eAvMmBsLjAWQHcQXtbZ1ap07KUXcS2kI49fRLKu/exec";
const WELLS=["Well 1","Well 2","Well 3","Well 4","Well 5","Well 6","Tank 1","Tank 2","Tank 3"];
const BLOCKS=["1A","1B","1C","1D","2A","2B","2C","2D","3A","3B","3C","3D","4A","4B","4C","4D","5A","5B","5C","5D","6A","6B","6C","6D","120"];

let preWell="",blocks=[],fertigation=false,submitting=false;

function nowLocal(){const d=new Date();d.setMinutes(d.getMinutes()-d.getTimezoneOffset());return d.toISOString().slice(0,16)}

function init(){
  const w=new URLSearchParams(window.location.search).get("well");
  if(w&&WELLS.includes(w)){
    preWell=w;
    document.getElementById("pill-text").textContent=w+" pre-selected";
    document.getElementById("scanned-pill").classList.remove("hidden");
  }
  buildQR();renderHome();
}

function showView(v){
  document.getElementById("form-view").style.display=v==="qr"||v==="success"?"none":"";
  document.getElementById("qr-view").style.display=v==="qr"?"block":"none";
  document.getElementById("success-view").classList.toggle("hidden",v!=="success");
}

function buildQR(){
  const base=window.location.href.split("?")[0];
  document.getElementById("qr-grid").innerHTML=WELLS.map(w=>`
    <div class="qr-card">
      <div class="qr-name">${w}</div>
      <img class="qr-img" src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&color=ffffff&bgcolor=000000&data=${encodeURIComponent(base+"?well="+encodeURIComponent(w))}" width="150" height="150" alt="${w}">
      <div class="qr-hint">Kingman Water Tracker</div>
      <button class="qr-dl" onclick="window.open('https://api.qrserver.com/v1/create-qr-code/?size=400x400&color=000000&bgcolor=ffffff&data=${encodeURIComponent(base+"?well="+encodeURIComponent(w))}','_blank')">Download</button>
    </div>`).join("");
}

function wellOpts(sel){return'<option value="">Select…</option>'+WELLS.map(w=>`<option${w===sel?" selected":""}>${w}</option>`).join("")}
function blockBtns(){return BLOCKS.map(b=>`<button class="bblock${blocks.includes(b)?" sel":""}" onclick="toggleBlock('${b}')">${b}</button>`).join("")}

function toggleBlock(b){
  blocks=blocks.includes(b)?blocks.filter(x=>x!==b):[...blocks,b];
  document.getElementById("block-grid").innerHTML=blockBtns();
  document.getElementById("sel-blocks").textContent=blocks.length?"✓ "+blocks.join(", "):"";
}

function toggleFert(){
  fertigation=!fertigation;
  document.getElementById("fert-row").classList.toggle("on",fertigation);
  document.getElementById("fert-toggle").textContent=fertigation?"✓":"";
}

function showErr(msg){const el=document.getElementById("err-msg");if(el)el.innerHTML=`<div class="err">${msg}</div>`}

function getGreeting(){const h=new Date().getHours();return h<12?"Good morning":"h<17?"Good afternoon":"Good evening"}

function renderHome(){
  blocks=[];fertigation=false;submitting=false;
  document.getElementById("main-content").innerHTML=`
    <div style="margin-bottom:32px">
      <div class="home-eyebrow">Hello</div>
      <div class="home-title">What are you<br>logging today?</div>
    </div>
    <div class="mode-grid">
      <div class="mode-card startup" onclick="renderStartup()">
        <div class="mc-icon g">
          <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        </div>
        <div class="mc-label">Start up</div>
        <div class="mc-desc">Log initial readings</div>
        <div class="mc-arrow">→</div>
      </div>
      <div class="mode-card shutdown" onclick="renderShutdown()">
        <div class="mc-icon r">
          <svg viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="1"/></svg>
        </div>
        <div class="mc-label">Shut down</div>
        <div class="mc-desc">Log final readings</div>
        <div class="mc-arrow">→</div>
      </div>
    </div>`;
}

function renderStartup(){
  blocks=[];fertigation=false;
  document.getElementById("main-content").innerHTML=`
    <div class="card">
      <div class="sec-head">
        <div class="sec-badge g"><span class="sec-badge-dot"></span>Start up</div>
        <div class="sec-info" style="text-align:right">
          <div class="sec-sub">Record initial readings</div>
        </div>
      </div>
      <div class="field">
        <div class="flabel">Date &amp; time</div>
        <input class="finput" type="datetime-local" id="f-dt" value="${nowLocal()}">
      </div>
      <div class="field">
        <div class="flabel">Well</div>
        <select class="finput" id="f-well">${wellOpts(preWell)}</select>
      </div>
      <div class="grid2">
        <div class="field">
          <div class="flabel">Engine hours</div>
          <input class="finput" type="number" step="0.1" placeholder="1234.5" id="f-eng">
        </div>
        <div class="field">
          <div class="flabel">Flow meter start</div>
          <input class="finput" type="number" step="0.01" placeholder="520.00" id="f-flow">
        </div>
      </div>
      <div class="grid2">
        <div class="field">
          <div class="flabel">GPM <span class="flabel-opt">optional</span></div>
          <input class="finput" type="number" step="1" placeholder="850" id="f-gpm">
        </div>
        <div class="field">
          <div class="flabel">RPM <span class="flabel-opt">optional</span></div>
          <input class="finput" type="number" step="1" placeholder="1750" id="f-rpm">
        </div>
      </div>
      <div class="field">
        <div class="flabel">Blocks being irrigated</div>
        <div class="block-wrap" id="block-grid">${blockBtns()}</div>
        <div class="sel-blocks" id="sel-blocks"></div>
      </div>
      <div class="field">
        <div class="flabel">Fertigation</div>
        <div class="fert-row" id="fert-row" onclick="toggleFert()">
          <div class="fert-toggle" id="fert-toggle"></div>
          <div>
            <div class="fert-label">Fertigation active</div>
            <div class="fert-desc">Fertilizer is being applied this run</div>
          </div>
        </div>
      </div>
      <div id="err-msg"></div>
      <div class="nav">
        <button class="btn-back" onclick="renderHome()">← Back</button>
        <button class="btn-save" id="save-btn" onclick="submitStartup()">Save start up</button>
      </div>
    </div>`;
}

async function submitStartup(){
  if(submitting)return;
  const dt=document.getElementById("f-dt").value,well=document.getElementById("f-well").value,
        eng=document.getElementById("f-eng").value,flow=document.getElementById("f-flow").value;
  if(!dt||!well||!eng||!flow||blocks.length===0){showErr("Please complete all required fields and select at least one block.");return;}
  submitting=true;
  const btn=document.getElementById("save-btn");
  btn.disabled=true;btn.textContent="Saving…";
  const p=new URLSearchParams({type:"startup",datetime:dt,well,engine_hours:eng,flow_meter_start:flow,
    gpm:document.getElementById("f-gpm").value||"",rpm:document.getElementById("f-rpm").value||"",
    blocks:blocks.join(", "),fertigation:fertigation?"Yes":"No"});
  try{
    await fetch(`${SHEET_URL}?${p}`,{method:"GET",mode:"no-cors"});
    btn.textContent="Saved ✓";btn.classList.add("saved");
    setTimeout(()=>{
      document.getElementById("s-title").textContent="Start up logged";
      document.getElementById("s-sub").textContent=well+" · "+blocks.join(", ");
      document.getElementById("s-stats").innerHTML=`
        <div class="s-stat"><div class="s-slabel">Flow meter</div><div class="s-sval">${flow}</div></div>
        <div class="s-stat"><div class="s-slabel">Engine hrs</div><div class="s-sval">${eng}</div></div>`;
      showView("success");
    },800);
  }catch(e){showErr("Failed to save. Check your connection.");btn.disabled=false;btn.textContent="Save start up";}
  submitting=false;
}

function renderShutdown(){
  document.getElementById("main-content").innerHTML=`
    <div class="card">
      <div class="sec-head">
        <div class="sec-badge r"><span class="sec-badge-dot"></span>Shut down</div>
        <div class="sec-info" style="text-align:right">
          <div class="sec-sub">Record final readings</div>
        </div>
      </div>
      <div class="field">
        <div class="flabel">Date &amp; time</div>
        <input class="finput" type="datetime-local" id="f-dt" value="${nowLocal()}">
      </div>
      <div class="field">
        <div class="flabel">Well</div>
        <select class="finput" id="f-well">${wellOpts(preWell)}</select>
      </div>
      <div class="grid2">
        <div class="field">
          <div class="flabel">Flow meter end</div>
          <input class="finput" type="number" step="0.01" placeholder="535.00" id="f-flow">
        </div>
        <div class="field">
          <div class="flabel">Engine hours</div>
          <input class="finput" type="number" step="0.1" placeholder="1238.5" id="f-eng">
        </div>
      </div>
      <div class="grid2">
        <div class="field">
          <div class="flabel">GPM <span class="flabel-opt">optional</span></div>
          <input class="finput" type="number" step="1" placeholder="850" id="f-gpm">
        </div>
        <div class="field">
          <div class="flabel">RPM <span class="flabel-opt">optional</span></div>
          <input class="finput" type="number" step="1" placeholder="1750" id="f-rpm">
        </div>
      </div>
      <div id="err-msg"></div>
      <div class="nav">
        <button class="btn-back" onclick="renderHome()">← Back</button>
        <button class="btn-save" id="save-btn" onclick="submitShutdown()">Save shut down</button>
      </div>
    </div>`;
}

async function submitShutdown(){
  if(submitting)return;
  const dt=document.getElementById("f-dt").value,well=document.getElementById("f-well").value,
        flow=document.getElementById("f-flow").value,eng=document.getElementById("f-eng").value;
  if(!dt||!well||!flow||!eng){showErr("Please complete all required fields.");return;}
  submitting=true;
  const btn=document.getElementById("save-btn");
  btn.disabled=true;btn.textContent="Saving…";
  const p=new URLSearchParams({type:"shutdown",datetime:dt,well,flow_meter_end:flow,engine_hours:eng,
    gpm:document.getElementById("f-gpm").value||"",rpm:document.getElementById("f-rpm").value||""});
  try{
    await fetch(`${SHEET_URL}?${p}`,{method:"GET",mode:"no-cors"});
    btn.textContent="Saved ✓";btn.classList.add("saved");
    setTimeout(()=>{
      document.getElementById("s-title").textContent="Shut down logged";
      document.getElementById("s-sub").textContent=well;
      document.getElementById("s-stats").innerHTML=`
        <div class="s-stat"><div class="s-slabel">Flow meter end</div><div class="s-sval">${flow}</div></div>
        <div class="s-stat"><div class="s-slabel">Engine hrs</div><div class="s-sval">${eng}</div></div>`;
      showView("success");
    },800);
  }catch(e){showErr("Failed to save. Check your connection.");btn.disabled=false;btn.textContent="Save shut down";}
  submitting=false;
}

function resetToHome(){showView("form");renderHome();}
init();
</script>
</body>
</html>
