<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kingman Water Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
body{background:#f7f8fa;color:#111;min-height:100vh}
.shell{max-width:560px;margin:0 auto;padding:32px 20px}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
.brand{display:flex;align-items:center;gap:10px}
.brand-dot{width:8px;height:8px;border-radius:50%;background:#2563eb}
.brand-name{font-size:15px;font-weight:600;letter-spacing:-.3px;color:#111}
.brand-sub{font-size:12px;color:#888;margin-top:1px}
.btn-ghost{background:none;border:1px solid #e5e7eb;border-radius:8px;padding:7px 14px;font-size:13px;font-weight:500;color:#444;cursor:pointer}
.btn-ghost:hover{background:#f0f0f0}
.btn-primary{background:#111;border:none;border-radius:8px;padding:11px 20px;font-size:14px;font-weight:500;color:#fff;cursor:pointer;transition:all .2s}
.btn-primary:hover{opacity:.85}
.btn-primary:active{transform:scale(.97)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-primary.saving{opacity:.6}
.btn-primary.saved{background:#16a34a;opacity:1}

.mode-wrap{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px}
.mode-card{background:#fff;border:1.5px solid #e5e7eb;border-radius:14px;padding:22px 18px;cursor:pointer;transition:all .15s;text-align:center}
.mode-card:hover{border-color:#2563eb;background:#f8fbff}
.mode-card.active{border-color:#2563eb;background:#f0f7ff}
.mode-icon{font-size:28px;margin-bottom:10px}
.mode-title{font-size:15px;font-weight:600;color:#111;margin-bottom:4px}
.mode-sub{font-size:12px;color:#888}

.card{background:#fff;border:1px solid #f0f0f0;border-radius:16px;padding:28px;margin-bottom:12px}
.section-header{display:flex;align-items:center;gap:10px;margin-bottom:24px}
.section-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px}
.icon-green{background:#dcfce7}
.icon-red{background:#fee2e2}
.icon-blue{background:#dbeafe}
.section-title{font-size:17px;font-weight:600;color:#111}
.section-sub{font-size:13px;color:#888;margin-top:2px}
.field{margin-bottom:18px}
.label{font-size:12px;font-weight:600;color:#888;letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.label-opt{font-size:11px;font-weight:400;color:#bbb;text-transform:none;letter-spacing:0}
.input{width:100%;border:1px solid #e5e7eb;border-radius:10px;padding:10px 14px;font-size:14px;color:#111;background:#fafafa;outline:none;transition:border .15s}
.input:focus{border-color:#2563eb;background:#fff}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.block-grid{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.block-btn{border:1px solid #e5e7eb;border-radius:7px;padding:6px 11px;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;background:#fafafa;color:#555}
.block-btn.sel{background:#111;color:#fff;border-color:#111}
.block-btn:hover:not(.sel){background:#f0f0f0}
.selected-blocks{font-size:12px;color:#2563eb;margin-top:8px;font-weight:500}

.check-row{display:flex;align-items:center;gap:10px;padding:12px 14px;background:#fafafa;border:1px solid #e5e7eb;border-radius:10px;cursor:pointer;user-select:none}
.check-row input[type=checkbox]{width:16px;height:16px;accent-color:#2563eb;cursor:pointer}
.check-label{font-size:14px;color:#111;font-weight:500}
.check-sub{font-size:12px;color:#888;margin-top:1px}

.error{font-size:13px;color:#dc2626;margin-top:14px;padding:10px 14px;background:#fef2f2;border-radius:8px}
.nav{display:flex;justify-content:space-between;align-items:center;margin-top:24px}
.scanned-pill{display:inline-flex;align-items:center;gap:6px;background:#dbeafe;border-radius:999px;padding:6px 14px;font-size:13px;color:#1d4ed8;font-weight:500;margin-bottom:20px}

.success-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f7f8fa}
.success-card{background:#fff;border:1px solid #f0f0f0;border-radius:20px;padding:40px;max-width:400px;width:100%;text-align:center}
.success-icon{width:56px;height:56px;background:#dcfce7;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:22px}
.success-title{font-size:20px;font-weight:600;color:#111;margin-bottom:8px}
.success-sub{font-size:14px;color:#888;margin-bottom:24px}
.stat-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px}
.stat-card{background:#f7f8fa;border-radius:12px;padding:14px}
.stat-label{font-size:11px;font-weight:600;color:#888;letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px}
.stat-val{font-size:20px;font-weight:600;color:#111}

.qr-shell{min-height:100vh;background:#f7f8fa;padding:28px 20px;display:none}
.qr-top{max-width:760px;margin:0 auto 24px;display:flex;align-items:center;gap:14px}
.qr-grid{max-width:760px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px}
.qr-card{background:#fff;border:1px solid #f0f0f0;border-radius:14px;padding:20px;display:flex;flex-direction:column;align-items:center;text-align:center}
.qr-well-name{font-size:15px;font-weight:600;color:#111;margin-bottom:12px}
.qr-sub{font-size:11px;color:#bbb;margin-top:8px}
.hidden{display:none}
</style>
</head>
<body>

<div class="qr-shell" id="qr-view">
  <div class="qr-top">
    <button class="btn-ghost" onclick="showView('home')">← Back</button>
    <div>
      <div style="font-size:17px;font-weight:600;color:#111">Well QR Codes</div>
      <div style="font-size:13px;color:#888;margin-top:2px">Scan to open form with well pre-selected</div>
    </div>
  </div>
  <div class="qr-grid" id="qr-grid"></div>
  <div style="text-align:center;font-size:12px;color:#ccc;margin-top:28px">Print with Cmd+P / Ctrl+P</div>
</div>

<div class="success-wrap hidden" id="success-view">
  <div class="success-card">
    <div class="success-icon">✓</div>
    <div class="success-title" id="s-title">Logged</div>
    <div class="success-sub" id="s-sub">Data saved to Google Sheets</div>
    <div class="stat-row" id="s-stats"></div>
    <div style="display:flex;flex-direction:column;gap:10px">
      <button class="btn-primary" style="width:100%" onclick="resetToHome()">Log another run</button>
    </div>
  </div>
</div>

<div class="shell" id="form-view">
  <div class="topbar">
    <div class="brand">
      <div class="brand-dot"></div>
      <div>
        <div class="brand-name">Kingman Water Tracker</div>
        <div class="brand-sub">Kingman Farm</div>
      </div>
    </div>
    <button class="btn-ghost" onclick="showView('qr')">QR Codes</button>
  </div>
  <div id="scanned-pill" class="scanned-pill hidden"></div>
  <div id="main-content"></div>
</div>

<script>
const SHEET_URL="https://script.google.com/macros/s/AKfycbz1h8OLEPKHgn4ooY3cbYijt9rW9eAvMmBsLjAWQHcQXtbZ1ap07KUXcS2kI49fRLKu/exec";
const WELLS=["Well 1","Well 2","Well 3","Well 4","Well 5","Well 6","Tank 1","Tank 2","Tank 3"];
const BLOCKS=["1A","1B","1C","1D","2A","2B","2C","2D","3A","3B","3C","3D","4A","4B","4C","4D","5A","5B","5C","5D","6A","6B","6C","6D","120"];

let preWell="",blocks=[],submitting=false;

function nowLocal(){const d=new Date();d.setMinutes(d.getMinutes()-d.getTimezoneOffset());return d.toISOString().slice(0,16)}

function init(){
  const w=new URLSearchParams(window.location.search).get("well");
  if(w&&WELLS.includes(w)){
    preWell=w;
    const p=document.getElementById("scanned-pill");
    p.textContent="◉  "+w+" pre-selected from QR scan";
    p.classList.remove("hidden");
  }
  buildQR();renderHome();
}

function showView(v){
  document.getElementById("form-view").style.display=v==="qr"||v==="success"?"none":"";
  document.getElementById("qr-view").style.display=v==="qr"?"block":"none";
  document.getElementById("success-view").classList.toggle("hidden",v!=="success");
}

function buildQR(){
  const base=window.location.href.split("?")[0];
  document.getElementById("qr-grid").innerHTML=WELLS.map(w=>`
    <div class="qr-card">
      <div class="qr-well-name">${w}</div>
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(base+"?well="+encodeURIComponent(w))}" style="width:160px;height:160px;border-radius:8px" alt="${w}">
      <div class="qr-sub">Kingman Water Tracker</div>
      <button class="btn-ghost" style="margin-top:12px;font-size:12px;padding:5px 12px"
        onclick="window.open('https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=${encodeURIComponent(base+"?well="+encodeURIComponent(w))}','_blank')">Download</button>
    </div>`).join("");
}

function wellOptions(sel){return'<option value="">Select well or tank…</option>'+WELLS.map(w=>`<option${w===sel?" selected":""}>${w}</option>`).join("")}
function blockBtns(){return BLOCKS.map(b=>`<button class="block-btn${blocks.includes(b)?" sel":""}" onclick="toggleBlock('${b}')">${b}</button>`).join("")}

function toggleBlock(b){
  blocks=blocks.includes(b)?blocks.filter(x=>x!==b):[...blocks,b];
  document.getElementById("block-grid").innerHTML=blockBtns();
  document.getElementById("sel-blocks").textContent=blocks.length?"Selected: "+blocks.join(", "):"";
}

function showError(msg){const el=document.getElementById("err-msg");if(el)el.innerHTML=`<div class="error">${msg}</div>`}

function renderHome(){
  blocks=[];submitting=false;
  document.getElementById("main-content").innerHTML=`
    <div style="margin-bottom:20px">
      <div style="font-size:18px;font-weight:600;color:#111;margin-bottom:6px">What would you like to log?</div>
      <div style="font-size:13px;color:#888">Select the type of entry for this run</div>
    </div>
    <div class="mode-wrap">
      <div class="mode-card" onclick="renderStartup()">
        <div class="mode-icon">▶</div>
        <div class="mode-title">Start up</div>
        <div class="mode-sub">Log initial readings when firing up a well</div>
      </div>
      <div class="mode-card" onclick="renderShutdown()">
        <div class="mode-icon">■</div>
        <div class="mode-title">Shut down</div>
        <div class="mode-sub">Log final readings when shutting down a well</div>
      </div>
    </div>`;
}

function renderStartup(){
  blocks=[];
  document.getElementById("main-content").innerHTML=`
    <div class="card">
      <div class="section-header">
        <div class="section-icon icon-green">▶</div>
        <div><div class="section-title">Start up</div><div class="section-sub">Record initial readings</div></div>
      </div>
      <div class="field"><div class="label">Date &amp; time</div>
        <input class="input" type="datetime-local" id="f-startup_dt" value="${nowLocal()}"></div>
      <div class="field"><div class="label">Well #</div>
        <select class="input" id="f-well">${wellOptions(preWell)}</select></div>
      <div class="grid2">
        <div class="field"><div class="label">Engine hours</div>
          <input class="input" type="number" step="0.1" placeholder="1234.5" id="f-eng-start"></div>
        <div class="field"><div class="label">Flow meter start</div>
          <input class="input" type="number" step="0.01" placeholder="520.00" id="f-flow-start"></div>
      </div>
      <div class="grid2">
        <div class="field"><div class="label"><span>GPM</span><span class="label-opt">optional</span></div>
          <input class="input" type="number" step="1" placeholder="e.g. 850" id="f-gpm"></div>
        <div class="field"><div class="label"><span>RPM</span><span class="label-opt">optional</span></div>
          <input class="input" type="number" step="1" placeholder="e.g. 1750" id="f-rpm"></div>
      </div>
      <div class="field"><div class="label">Blocks being irrigated</div>
        <div class="block-grid" id="block-grid">${blockBtns()}</div>
        <div class="selected-blocks" id="sel-blocks"></div>
      </div>
      <div class="field">
        <label class="check-row" onclick="toggleFert()">
          <input type="checkbox" id="f-fert" onclick="event.stopPropagation()">
          <div><div class="check-label">Fertigation</div>
            <div class="check-sub">Check if fertilizer is being applied during this run</div></div>
        </label>
      </div>
      <div id="err-msg"></div>
      <div class="nav">
        <button class="btn-ghost" onclick="renderHome()">← Back</button>
        <button class="btn-primary" id="save-btn" onclick="submitStartup()">Save Start Up</button>
      </div>
    </div>`;
}

function toggleFert(){const cb=document.getElementById("f-fert");cb.checked=!cb.checked;}

async function submitStartup(){
  if(submitting)return;
  const dt=document.getElementById("f-startup_dt").value,well=document.getElementById("f-well").value,
        eng=document.getElementById("f-eng-start").value,flow=document.getElementById("f-flow-start").value;
  if(!dt||!well||!eng||!flow||blocks.length===0){showError("Please fill in all required fields and select at least one block.");return;}
  submitting=true;
  const btn=document.getElementById("save-btn");
  btn.disabled=true;btn.classList.add("saving");btn.textContent="Saving…";
  const p=new URLSearchParams({type:"startup",datetime:dt,well,engine_hours:eng,flow_meter_start:flow,
    gpm:document.getElementById("f-gpm").value||"",rpm:document.getElementById("f-rpm").value||"",
    blocks:blocks.join(", "),fertigation:document.getElementById("f-fert").checked?"Yes":"No"});
  try{
    await fetch(`${SHEET_URL}?${p}`,{method:"GET",mode:"no-cors"});
    btn.classList.remove("saving");btn.classList.add("saved");btn.textContent="Saved ✓";
    setTimeout(()=>{
      document.getElementById("s-title").textContent="Start up logged";
      document.getElementById("s-sub").textContent=well+" · "+blocks.join(", ");
      document.getElementById("s-stats").innerHTML=`
        <div class="stat-card"><div class="stat-label">Flow meter</div><div class="stat-val">${flow}</div></div>
        <div class="stat-card"><div class="stat-label">Engine hrs</div><div class="stat-val">${eng}</div></div>`;
      showView("success");
    },400);
  }catch(e){showError("Error: "+e.message);btn.disabled=false;btn.classList.remove("saving");btn.textContent="Save Start Up";}
  submitting=false;
}

function renderShutdown(){
  document.getElementById("main-content").innerHTML=`
    <div class="card">
      <div class="section-header">
        <div class="section-icon icon-red">■</div>
        <div><div class="section-title">Shut down</div><div class="section-sub">Record final readings</div></div>
      </div>
      <div class="field"><div class="label">Date &amp; time</div>
        <input class="input" type="datetime-local" id="f-shutdown_dt" value="${nowLocal()}"></div>
      <div class="field"><div class="label">Well #</div>
        <select class="input" id="f-well-stop">${wellOptions(preWell)}</select></div>
      <div class="grid2">
        <div class="field"><div class="label">Flow meter end</div>
          <input class="input" type="number" step="0.01" placeholder="535.00" id="f-flow-end"></div>
        <div class="field"><div class="label">Engine hours</div>
          <input class="input" type="number" step="0.1" placeholder="1238.5" id="f-eng-end"></div>
      </div>
      <div class="grid2">
        <div class="field"><div class="label"><span>GPM</span><span class="label-opt">optional</span></div>
          <input class="input" type="number" step="1" placeholder="e.g. 850" id="f-gpm-stop"></div>
        <div class="field"><div class="label"><span>RPM</span><span class="label-opt">optional</span></div>
          <input class="input" type="number" step="1" placeholder="e.g. 1750" id="f-rpm-stop"></div>
      </div>
      <div id="err-msg"></div>
      <div class="nav">
        <button class="btn-ghost" onclick="renderHome()">← Back</button>
        <button class="btn-primary" id="save-btn" onclick="submitShutdown()">Save Shut Down</button>
      </div>
    </div>`;
}

async function submitShutdown(){
  if(submitting)return;
  const dt=document.getElementById("f-shutdown_dt").value,well=document.getElementById("f-well-stop").value,
        flow=document.getElementById("f-flow-end").value,eng=document.getElementById("f-eng-end").value;
  if(!dt||!well||!flow||!eng){showError("Please fill in all required fields.");return;}
  submitting=true;
  const btn=document.getElementById("save-btn");
  btn.disabled=true;btn.classList.add("saving");btn.textContent="Saving…";
  const p=new URLSearchParams({type:"shutdown",datetime:dt,well,flow_meter_end:flow,engine_hours:eng,
    gpm:document.getElementById("f-gpm-stop").value||"",rpm:document.getElementById("f-rpm-stop").value||""});
  try{
    await fetch(`${SHEET_URL}?${p}`,{method:"GET",mode:"no-cors"});
    btn.classList.remove("saving");btn.classList.add("saved");btn.textContent="Saved ✓";
    setTimeout(()=>{
      document.getElementById("s-title").textContent="Shut down logged";
      document.getElementById("s-sub").textContent=well;
      document.getElementById("s-stats").innerHTML=`
        <div class="stat-card"><div class="stat-label">Flow meter end</div><div class="stat-val">${flow}</div></div>
        <div class="stat-card"><div class="stat-label">Engine hrs</div><div class="stat-val">${eng}</div></div>`;
      showView("success");
    },400);
  }catch(e){showError("Error: "+e.message);btn.disabled=false;btn.classList.remove("saving");btn.textContent="Save Shut Down";}
  submitting=false;
}

function resetToHome(){blocks=[];submitting=false;showView("form");renderHome();}
init();
</script>
</body>
</html>
